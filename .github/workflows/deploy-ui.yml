name: Deploy UI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout UI repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UI
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: pnpm build

      - name: Package UI dist
        run: tar -czf ui-dist.tar.gz -C dist .

      - name: Upload UI archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          source: "ui-dist.tar.gz"
          target: "${{ secrets.VPS_APP_DIR }}/incoming"

      - name: Publish UI on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            ROOT_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR="${ROOT_DIR}/api"
            INCOMING_DIR="${ROOT_DIR}/incoming"

            rm -rf "$APP_DIR/dist"
            mkdir -p "$APP_DIR/dist"
            tar -xzf "$INCOMING_DIR/ui-dist.tar.gz" -C "$APP_DIR/dist"
            rm -f "$INCOMING_DIR/ui-dist.tar.gz"

            ${{ secrets.VPS_API_RESTART_CMD }}
